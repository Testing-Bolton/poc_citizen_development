name: Business Check + Security Gate

# Scatta SOLO quando arriva vero codice applicativo, non quando il
# template scrive solo i suoi file di scaffolding (.github, .bolton, README).
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '.bolton/**'
      - 'README*.md'

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  # ===========================================================================
  # 0) GUARDIA - Controlla se c'è codice vero o solo scaffolding
  # ===========================================================================
  guard:
    name: Check if real code exists
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
      
      - id: check
        name: Verifica presenza file applicativi
        run: |
          # Cerca tutti i file, escludendo le cartelle di Git, Github, Bolton e i README
          FILES=$(find . -type f -not -path "*/\.git/*" -not -path "*/\.github/*" -not -path "*/\.bolton/*" -not -name "README*.md")
          
          if [ -n "$FILES" ]; then
            echo "Trovato codice applicativo vero. Procediamo."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Trovati solo file di template o repo vuota. Mi fermo."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # 1) ANALISI DI SICUREZZA - CodeQL come step esplicito (controllo del timing)
  # ===========================================================================
  code-scanning:
    name: CodeQL Analysis (Python)
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ===========================================================================
  # 2) RILEVAMENTO PRIMA VOLTA (marker in .github/.approved)
  # ===========================================================================
  check-first-run:
    name: Check if this is first run
    runs-on: ubuntu-latest
    needs: code-scanning
    outputs:
      is_first_run: ${{ steps.check.outputs.first_run }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if this is first run
        id: check
        run: |
          if [ -f ".github/.approved" ]; then
            echo "Marker presente: app gia' approvata."
            echo "first_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Marker assente: prima volta."
            echo "first_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================================================
  # 3) RACCOLTA ESITO GHAS + NOTIFICA TEAMS (solo se prima volta)
  # ===========================================================================
  notify-business:
    name: Notify business team
    runs-on: ubuntu-latest
    needs: check-first-run
    if: needs.check-first-run.outputs.is_first_run == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Collect GHAS alert counts
        id: ghas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE_ALERTS=$(gh api \
            "repos/${{ github.repository }}/code-scanning/alerts?state=open" \
            --jq 'length' 2>/dev/null || echo "")
          SECRET_ALERTS=$(gh api \
            "repos/${{ github.repository }}/secret-scanning/alerts?state=open" \
            --jq 'length' 2>/dev/null || echo "")
          echo "code_alerts=$CODE_ALERTS" >> "$GITHUB_OUTPUT"
          echo "secret_alerts=$SECRET_ALERTS" >> "$GITHUB_OUTPUT"
          echo "Letti: code=$CODE_ALERTS secret=$SECRET_ALERTS"


      - name: Setup business-approval environment and reviewer team
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          curl -L --fail \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/teams/repo-approvers/repos/${{ github.repository }}" \
            -d '{"permission":"push"}'

          curl -L --fail \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/environments/business-approval" \
            -d '{"reviewers": [{"type":"Team","id":18113363}]}'

  # ===========================================================================
  # 4) GATE DI APPROVAZIONE - si ferma finche' il reviewer team non approva
  # ===========================================================================
  business-approval:
    name: Wait for business approval
    runs-on: ubuntu-latest
    needs: [check-first-run, notify-business]
    if: needs.check-first-run.outputs.is_first_run == 'true'
    environment: business-approval
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write approval marker
        run: |
          echo "Repository approved by Business Team on $(date)" > .github/.approved
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.approved
          git commit -m "repository marked as approved [skip ci]"
          git push

  # ===========================================================================
  # 5) BUILD FITTIZIA + TAGGING passed/not-passed
  # ===========================================================================
  build-and-tag:
    name: Build (placeholder) + tag result
    runs-on: ubuntu-latest
    needs: [check-first-run, business-approval, code-scanning]
    if: always() && needs.code-scanning.result == 'success' && (needs.check-first-run.outputs.is_first_run == 'false' || needs.business-approval.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build placeholder
        run: |
          echo "===================================="
          echo " Building application..."
          echo " (placeholder - nessuna build reale)"
          echo "===================================="

      - name: Determine pass/fail tag
        id: tagdecision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CODE_ALERTS=$(gh api \
            "repos/${{ github.repository }}/code-scanning/alerts?state=open" \
            --jq 'length' 2>/dev/null || echo "")
          SECRET_ALERTS=$(gh api \
            "repos/${{ github.repository }}/secret-scanning/alerts?state=open" \
            --jq 'length' 2>/dev/null || echo "")

          if [ "${CODE_ALERTS:-0}" = "0" ] && [ "${SECRET_ALERTS:-0}" = "0" ]; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=not-passed" >> "$GITHUB_OUTPUT"
          fi

      - name: Create result tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="run-${{ github.run_number }}-${{ steps.tagdecision.outputs.result }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Tag creato: ${TAG}"
